<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
            text-shadow: 
                0 0 20px rgba(0, 200, 255, 0.8),
                0 0 40px rgba(0, 200, 255, 0.4),
                0 0 60px rgba(0, 200, 255, 0.2);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 
                    0 0 20px rgba(0, 200, 255, 0.8),
                    0 0 40px rgba(0, 200, 255, 0.4),
                    0 0 60px rgba(0, 200, 255, 0.2);
            }
            to {
                text-shadow: 
                    0 0 30px rgba(120, 0, 255, 0.8),
                    0 0 60px rgba(120, 0, 255, 0.4),
                    0 0 90px rgba(120, 0, 255, 0.2);
            }
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 300px;
        }

        .menu-btn {
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(90deg, rgba(0, 200, 255, 0.1) 0%, rgba(120, 0, 255, 0.1) 100%);
            border: 2px solid rgba(0, 200, 255, 0.5);
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .menu-btn:hover {
            background: linear-gradient(90deg, rgba(0, 200, 255, 0.3) 0%, rgba(120, 0, 255, 0.3) 100%);
            border-color: rgba(0, 200, 255, 0.8);
            transform: scale(1.05);
            box-shadow: 
                0 0 20px rgba(0, 200, 255, 0.4),
                0 0 40px rgba(120, 0, 255, 0.2);
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <h1 class="title">Игра</h1>
        <div class="menu">
            <button class="menu-btn">Новая игра</button>
            <button class="menu-btn">Продолжить</button>
            <button class="menu-btn">Настройки</button>
            <button class="menu-btn">Выход</button>
        </div>
    </div>

    <div class="version">v1.0.0</div>

    <script>
        const starsContainer = document.getElementById('stars');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            starsContainer.appendChild(star);
        }

        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                alert(btn.textContent);
            });
        });
    </script>
</body>
</html>
